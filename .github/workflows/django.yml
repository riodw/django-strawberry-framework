name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          # Distinct cache namespace per setup-uv job: lint / test / pages otherwise
          # share one key on Python 3.12.3 + the same uv.lock and race to save it
          # (and overwrite each other's pruned cache content).
          cache-suffix: lint
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .
      - name: Trailing-comma layout (>=4 elements; models.py >=2)
        run: uv run python scripts/check_trailing_commas.py --check

  test:
    name: Python ${{ matrix.python }} - Django ${{ matrix.django }} - ${{ matrix.database }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      # If one version fails, don't stop the others
      fail-fast: false
      matrix:
        # Manual dispatch (workflow_dispatch) runs the full matrix AND exercises
        # both the default single-DB settings and the sharded fakeshop DATABASES
        # layout (FAKESHOP_SHARDED=1) on every Python/Django node — the multi-DB
        # contract is gated only at the dispatch tier so push/PR feedback stays
        # fast. Push/PR runs only the minimum-support combo and the latest combo,
        # single-DB only (covers both ends without doubling CI wall-clock).
        # The minimum-support nodes (Django 5.2.0 / Python 3.10) also force-install
        # exactly strawberry-graphql==0.316.0 so the advertised per-operation
        # extension-isolation floor (spec-044 Decision 6) is durably exercised on
        # every push/PR, coverage-free (the latest node keeps the coverage gate).
        include: >-
          ${{ github.event_name == 'workflow_dispatch' && fromJSON('[
            {"django": "5.2.0", "python": "3.10", "database": "single DB", "fakeshop_sharded": "0", "strawberry": "0.316.0"},
            {"django": "5.2.0", "python": "3.10", "database": "multi DB", "fakeshop_sharded": "1", "strawberry": "0.316.0"},
            {"django": "5.2.*", "python": "3.11", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.11", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "5.2.*", "python": "3.12", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.12", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "5.2.*", "python": "3.13", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.13", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.12", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.12", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.13", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.13", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.14", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "latest", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0", "coverage": "1"},
            {"django": "latest", "python": "3.14", "database": "multi DB", "fakeshop_sharded": "1"}
          ]') || fromJSON('[
            {"django": "5.2.0", "python": "3.10", "database": "single DB", "fakeshop_sharded": "0", "strawberry": "0.316.0"},
            {"django": "latest", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0", "coverage": "1"}
          ]') }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          # One cache per matrix node: nodes sharing a Python (e.g. several 3.12
          # combos on a full dispatch) would otherwise share a key and race / thrash.
          cache-suffix: test-${{ matrix.python }}-${{ matrix.django }}-${{ matrix.fakeshop_sharded }}

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }}

      - name: Install Django ${{ matrix.django }}
        run: |
          if [ "${{ matrix.django }}" == "latest" ]; then
            uv pip install "Django" --upgrade
          else
            uv pip install "Django==${{ matrix.django }}"
          fi
          uv run --no-sync django-admin --version

      - name: Install Strawberry ${{ matrix.strawberry }} (minimum supported floor)
        # Only the minimum-support nodes pin the exact floor; the other nodes run
        # the uv.lock-resolved (latest compatible) strawberry-graphql. Recording
        # the resolved version makes the exercised floor auditable in the log.
        if: matrix.strawberry
        run: |
          uv pip install "strawberry-graphql==${{ matrix.strawberry }}"
          uv run --no-sync python -c "import strawberry; print('strawberry-graphql', strawberry.__version__)"

      - name: Run Tests (${{ matrix.database }})
        # The latest single-DB node owns the fail_under=100 coverage gate and
        # Coveralls upload. Compatibility nodes run the identical test selection
        # without tracing it again: Coverage.py 7.14 uses its fast sys.monitoring
        # core on Python 3.14, while Python <=3.13 must use the much slower
        # sys.settrace core. `-o addopts` replaces pytest.ini's addopts wholesale,
        # so the compatibility branch drops --cov without --no-cov's warning.
        env:
          FAKESHOP_SHARDED: ${{ matrix.fakeshop_sharded }}
        run: |
          if [ "${{ matrix.coverage }}" = "1" ]; then
            addopts="-v -n auto --dist loadscope --cov --cov-report=term-missing --durations=25"
          else
            addopts="-v -n auto --dist loadscope --durations=25"
          fi
          uv run --no-sync pytest -o addopts="$addopts"

      - name: Upload Coverage to Coveralls
        # Only upload from the primary matrix node to avoid duplicate builds.
        if: >-
          github.ref == 'refs/heads/main' &&
          matrix.coverage == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv pip install coveralls
          uv run --no-sync coveralls
