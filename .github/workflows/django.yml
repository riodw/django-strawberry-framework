name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .

  test:
    name: Python ${{ matrix.python }} - Django ${{ matrix.django }} - ${{ matrix.database }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      # If one version fails, don't stop the others
      fail-fast: false
      matrix:
        # Manual dispatch (workflow_dispatch) runs the full matrix AND exercises
        # both the default single-DB settings and the sharded fakeshop DATABASES
        # layout (FAKESHOP_SHARDED=1) on every Python/Django node — the multi-DB
        # contract is gated only at the dispatch tier so push/PR feedback stays
        # fast. Push/PR runs only the minimum-support combo and the latest combo,
        # single-DB only (covers both ends without doubling CI wall-clock).
        include: >-
          ${{ github.event_name == 'workflow_dispatch' && fromJSON('[
            {"django": "5.2.*", "python": "3.10", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.10", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "5.2.*", "python": "3.11", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.11", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "5.2.*", "python": "3.12", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.12", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "5.2.*", "python": "3.13", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "5.2.*", "python": "3.13", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.12", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.12", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.13", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.13", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "6.0.*", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "6.0.*", "python": "3.14", "database": "multi DB", "fakeshop_sharded": "1"},
            {"django": "latest", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "latest", "python": "3.14", "database": "multi DB", "fakeshop_sharded": "1"}
          ]') || fromJSON('[
            {"django": "5.2.*", "python": "3.10", "database": "single DB", "fakeshop_sharded": "0"},
            {"django": "latest", "python": "3.14", "database": "single DB", "fakeshop_sharded": "0"}
          ]') }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }}

      - name: Install Django ${{ matrix.django }}
        run: |
          if [ "${{ matrix.django }}" == "latest" ]; then
            uv pip install "Django" --upgrade
          else
            uv pip install "Django==${{ matrix.django }}"
          fi
          uv run django-admin --version

      - name: Run Tests (${{ matrix.database }})
        # pytest.ini wires `--cov`, and pyproject.toml enforces fail_under=100,
        # so this step both tests and gates coverage.
        env:
          FAKESHOP_SHARDED: ${{ matrix.fakeshop_sharded }}
        run: uv run pytest

      - name: Upload Coverage to Coveralls
        # Only upload from the primary matrix node to avoid duplicate builds.
        if: >-
          github.ref == 'refs/heads/main' &&
          matrix.python == '3.14' &&
          matrix.django == 'latest' &&
          matrix.database == 'single DB'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv pip install coveralls
          uv run coveralls
