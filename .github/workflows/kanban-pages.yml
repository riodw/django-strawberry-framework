name: Kanban Pages

on:
  push:
    branches: ["main"]
    # Regenerate-and-deploy: the build job re-runs the export scripts against the
    # fakeshop GraphQL schema + db.sqlite3, so this tracks the rendering INPUTS (data,
    # scripts, GraphQL schema/models, config) — NOT the regenerated outputs
    # (KANBAN.md/html, docs/GLOSSARY.md), which the job overwrites. Migrations/tests
    # under the app globs are excluded (they never change the rendered board); a package
    # or other engine change that does alter rendering is republished via the next
    # input change or a manual workflow_dispatch.
    paths:
      - ".github/workflows/kanban-pages.yml"
      - "examples/fakeshop/db.sqlite3"
      - "examples/fakeshop/config/**"
      - "examples/fakeshop/apps/kanban/**"
      - "!examples/fakeshop/apps/kanban/migrations/**"
      - "!examples/fakeshop/apps/kanban/tests/**"
      - "examples/fakeshop/apps/glossary/**"
      - "!examples/fakeshop/apps/glossary/migrations/**"
      - "!examples/fakeshop/apps/glossary/tests/**"
      - "scripts/build_glossary_md.py"
      - "scripts/build_kanban_html.py"
      - "scripts/build_kanban_md.py"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev --python 3.12

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          mkdir -p _site/docs
          cp KANBAN.html _site/index.html
          uv run python scripts/build_kanban_html.py --html _site/index.html
          uv run python scripts/build_kanban_md.py --md _site/KANBAN.md
          uv run python scripts/build_glossary_md.py --md _site/docs/GLOSSARY.md
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v5
