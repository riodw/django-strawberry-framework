name: Postgres CI

# Manual-only tier. The Postgres suite spins up a real Postgres service and
# runs the FULL test suite against it, which is resource-heavy, so it is gated
# behind workflow_dispatch (the "Run workflow" button) rather than firing on
# every push / pull_request like Django CI does.
on:
  workflow_dispatch:

jobs:
  test-postgres:
    # The Postgres tier: the FULL suite against a real Postgres server via the
    # FAKESHOP_PG_DSN settings branch. This is where @pytest.mark.pg tests
    # (vendor-specific SQL, e.g. the LATERAL nested-fetch strategy) actually
    # execute, and where the whole suite proves vendor portability. Same
    # fail_under=100 gate: the code is structured so no line is
    # Postgres-only-reachable (pure SQL builders + stubbed-connection tests
    # cover strategy internals on sqlite), so coverage holds on both tiers.
    name: Postgres - Python 3.14 - Django latest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fakeshop
          POSTGRES_PASSWORD: fakeshop
          POSTGRES_DB: fakeshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fakeshop"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-suffix: test-postgres
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies (with the pg group)
        run: uv sync --python 3.14 --group pg
      - name: Install latest Django
        run: |
          uv pip install "Django" --upgrade
          uv run django-admin --version
      - name: Run Tests (Postgres)
        # Two overrides vs the pytest.ini defaults, both carried by a single
        # `-o addopts=...`, which REPLACES the ini `addopts` wholesale -- so we
        # re-list the flags we keep. Every other ini key (testpaths,
        # filterwarnings=error, asyncio_mode, markers) is a separate option and
        # stays in force.
        #
        # 1. `-n 12` instead of `-n auto` (= 4 on a standard ubuntu-latest):
        #    this tier is I/O-bound -- every test round-trips to a real Postgres
        #    server over TCP, so workers spend most of their time WAITING on the
        #    DB, not the CPU. Over-subscribing past the core count lets one
        #    worker's query run while another blocks on I/O. 12 is a starting
        #    point (3x cores; well under Postgres' default max_connections=100)
        #    -- dial it against measured runs; too high and per-worker test-DB
        #    creation + migration replay starts to dominate.
        #
        # 2. `--cov`/`--cov-report` dropped: coverage is redundant on this tier.
        #    The sqlite tier (django.yml) already enforces fail_under=100 on
        #    every push/PR, and the code is structured so no line is
        #    Postgres-only-reachable -- coverage is vendor-identical, so
        #    re-tracing it here only adds per-line + per-worker-combine overhead.
        #    This job's contract is "does the suite PASS on Postgres", not
        #    "re-measure coverage". (We strip `--cov` via addopts rather than
        #    passing `--no-cov`, which would emit a warning that
        #    filterwarnings=error turns into a failure.)
        env:
          FAKESHOP_PG_DSN: postgres://fakeshop:fakeshop@127.0.0.1:5432/fakeshop
        run: uv run pytest -o addopts="-v -n 12 --dist loadscope"
