<script>
  (function (JSON, Response) {
    const djDebug = document.getElementById("djDebug");
    function update(data) {
      if (
        data === null ||
        typeof data !== "object" ||
        !Object.prototype.hasOwnProperty.call(data, "debugToolbar")
      ) {
        return data;
      }

      // Payload scrubbing is mandatory; DOM updates are best-effort. Capture the
      // debug payload and strip the server-only "debugToolbar" key BEFORE any
      // DOM-dependent work, so a missing toolbar handle - or a panel present in
      // the payload whose content/nav node is absent from the current toolbar
      // DOM - can never leak the key back into the GraphiQL response.
      const toolbar = data.debugToolbar;
      delete data.debugToolbar;

      if (djDebug === null) return data;

      Object.entries(toolbar.panels).forEach(([id, panel]) => {
        if (panel.title) {
          const content = djDebug.querySelector(`#${id}`);
          if (content === null) return;

          content
            .querySelector(".djDebugPanelTitle")
            .querySelector("h3").textContent = panel.title;

          content.querySelector(".djdt-scroll").innerHTML = "";

          if (content.querySelector(".djdt-loader") === null) {
            const loader = document.createElement("div");
            loader.className = "djdt-loader";
            content.querySelector(".djDebugPanelContent").prepend(loader);
          }
        }
        if (panel.subtitle) {
          const nav = document.getElementById(`djdt-${id}`);
          if (nav !== null) {
            nav.querySelector("small").textContent = panel.subtitle;
          }
        }
      });
      djDebug.setAttribute("data-request-id", toolbar.requestId);

      return data;
    }

    const origParse = JSON.parse;
    JSON.parse = function () {
      return update(origParse.apply(this, arguments));
    };

    const origJson = Response.prototype.json
    Response.prototype.json = function () {
      return origJson.apply(this, arguments).then((data) => update(data));
    };

  })(JSON, Response);
</script>
