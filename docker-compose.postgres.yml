# Local Postgres for the FAKESHOP_PG_DSN test tier (see
# examples/fakeshop/config/settings.py "Postgres tier" and the
# test-postgres job in .github/workflows/django.yml).
#
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
#   uv sync --group pg
#   FAKESHOP_PG_DSN=postgres://fakeshop:fakeshop@127.0.0.1:5432/fakeshop uv run pytest
#
# Data lives on a tmpfs: throwaway by design (the suite creates its own test
# database per run); `down` discards everything.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fakeshop
      POSTGRES_PASSWORD: fakeshop
      POSTGRES_DB: fakeshop
    ports:
      - "127.0.0.1:5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakeshop"]
      interval: 2s
      timeout: 3s
      retries: 15
