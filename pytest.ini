[pytest]
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = examples/fakeshop
python_files = tests.py test_*.py *_tests.py
testpaths = tests examples/fakeshop/tests examples/fakeshop/test_query examples/fakeshop/apps
# ``-n auto --dist loadscope``: parallelize across CPU cores (pytest-xdist), grouping
# every test in a module onto ONE worker. loadscope (not the default ``load``) is
# REQUIRED here: the suite assumes a stable within-file order (no pytest-randomly) and
# several tests rebuild the global DjangoType registry / reload ``config.schema`` in
# autouse fixtures — scattering a file's tests across workers would re-expose the
# order-dependent registry pollution. Workers are separate processes, so each gets its
# own registry + in-memory SQLite test DB; pytest-cov combines per-worker coverage for
# the fail_under=100 gate. Pass ``-n0`` to disable for a fast single-test run.
addopts = -v -n auto --dist loadscope --cov --cov-report=term-missing
asyncio_mode = auto
# ``pg``: tests that only make sense against a real Postgres server (vendor-
# specific SQL such as the LATERAL-join fetch strategy). They self-skip on any
# other vendor via the shared conftest helper; the ``test-postgres`` CI job
# (FAKESHOP_PG_DSN) is where they execute.
markers =
    pg: requires the Postgres test tier (FAKESHOP_PG_DSN); auto-skipped on other vendors
# Treat every warning as a test failure (NASA Power-of-Ten Rule 10 analog): a
# silent RuntimeWarning/DeprecationWarning is a bug waiting to surface — e.g. an
# unawaited coroutine. Append targeted `ignore::` lines below ONLY for warnings
# originating in third-party packages we cannot fix; never blanket-ignore.
filterwarnings =
    error
